<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Контакты — MyBusiness</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <nav class="navbar">
        <div class="logo">MyBusiness</div>
        <ul class="nav-links">
            <li><a href="index.html">Главная</a></li>
            <li><a href="about.html">О&nbsp;нас</a></li>
            <li><a href="services.html">Услуги</a></li>
            <li><a href="contact.html">Контакты</a></li>
        </ul>
    </nav>
    <div class="container">
        <section class="section">
            <h2>Свяжитесь с нами</h2>
            <p>Есть вопросы или хотите сотрудничать с нами? Заполните форму ниже, и мы свяжемся с вами как можно скорее.</p>
            <form class="contact-form" onsubmit="event.preventDefault(); alert('This is a static template. Please integrate your own form handler.');">
                <div class="form-group">
                    <label for="name">Имя</label>
                    <input type="text" id="name" name="name" placeholder="Ваше имя" required />
                </div>
                <div class="form-group">
                    <label for="email">Электронная почта</label>
                    <input type="email" id="email" name="email" placeholder="Ваш e‑mail" required />
                </div>
                <div class="form-group">
                    <label for="message">Сообщение</label>
                    <textarea id="message" name="message" placeholder="Ваше сообщение" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn">Отправить сообщение</button>
            </form>
        </section>
    </div>
    <footer class="footer">
        © 2026 MyBusiness. Все права защищены.
    </footer>
</body>
</html>
